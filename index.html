<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight-Manga | Karanlık Dünyalara Açılan Kapı</title>
    <style>
        :root { --main-color: #9d4edd; --bg-color: #0a0a0c; --card-bg: #161b22; }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        header { background: rgba(0,0,0,0.8); padding: 20px; text-align: center; border-bottom: 2px solid var(--main-color); position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; color: var(--main-color); letter-spacing: 2px; text-transform: uppercase; }
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(to bottom, #1a1a1a, #0a0a0c); }
        .hero h2 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { color: #888; font-size: 1.1rem; }
        .manga-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .manga-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; transition: 0.3s; border: 1px solid #30363d; position: relative; }
        .manga-card:hover { transform: translateY(-10px); border-color: var(--main-color); box-shadow: 0 10px 20px rgba(157, 78, 221, 0.2); }
        .manga-card img { width: 100%; height: 300px; object-fit: cover; }
        .manga-info { padding: 15px; text-align: center; }
        .manga-info a { color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .manga-info p { margin: 0; color: var(--main-color); font-size: 0.9rem; }
        footer { text-align: center; padding: 40px; color: #666; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

    <header>
        <h1>MIDNIGHT-MANGA</h1>
    </header>

    <section class="hero">
        <h2>Karanlık Dünyalara Açılan Kapı</h2>
        <p>En güncel manga ve webtoon çevirileri Midnight kalitesiyle.</p>
    </section>

    <div class="manga-container" id="manga-list">
        <div class="manga-card">
            <img src="at-the-end-of-the-road/b1/1%20(2).jpg" alt="At the End of the Road">
            <div class="manga-info">
                <a href="chapters.html?name=At-The-End-Of-The-Road">At the End of the Road</a>
                <p>Tüm Bölümler</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Midnight-Manga. Tüm Hakları Saklıdır.</p>
    </footer>

</body>
</html>
