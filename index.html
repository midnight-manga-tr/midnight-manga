<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight-Manga | Karanlığın Sesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #9d4edd; 
            --bg: #0a0a0c;
            --card: #161b22;
            --text: #e6edf3;
            --accent: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        /* --- SİTE LOGO STİLİ --- */
        .site-logo {
            text-align: center;
            padding: 30px 0 10px 0;
            width: 100%;
        }
        .site-logo a {
            font-size: 42px;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
            display: inline-block;
        }
        .site-logo a:hover {
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.5);
        }

        nav {
            background: rgba(10, 10, 12, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: center; /* Logoyu merkeze aldık */
            align-items: center;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hero {
            padding: 4rem 5%;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, var(--bg));
        }

        .container { padding: 2rem 5%; max-width: 1300px; margin: 0 auto; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .manga-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            transition: 0.3s;
            position: relative;
            cursor: pointer;
        }

        .manga-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .manga-img { width: 100%; height: 280px; object-fit: cover; }
        .manga-content { padding: 15px; }
        .manga-title { font-weight: bold; margin-bottom: 10px; font-size: 1rem; }

        .chapter-btn {
            background: #21262d;
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
        }

        /* --- BUTONLAR --- */
        #backToTop { 
            display: none; position: fixed; bottom: 20px; right: 20px; 
            z-index: 999; border: none; background-color: var(--primary); 
            color: white; cursor: pointer; padding: 15px; border-radius: 50%; 
            font-size: 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); transition: 0.3s; 
        }

        #modeToggle { 
            position: fixed; top: 20px; left: 20px; z-index: 1001; 
            background: #333; color: white; border: 1px solid var(--primary); 
            padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        #modeToggle:hover { background: var(--primary); }

        /* --- ADMIN PANEL --- */
        #adminToggle {
            position: fixed; bottom: 20px; left: 20px;
            background: #21262d; color: white; border: none;
            padding: 12px; border-radius: 50%; cursor: pointer; z-index: 1000;
        }

        #adminPanel {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--card);
            padding: 2rem; border-radius: 15px; border: 2px solid var(--primary);
            z-index: 1001; width: 90%; max-width: 400px;
        }

        .admin-input {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #0d1117; border: 1px solid #30363d;
            color: white; border-radius: 5px; box-sizing: border-box;
        }

        .btn-save {
            background: var(--primary); color: white; width: 100%;
            padding: 10px; border: none; border-radius: 5px; cursor: pointer;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
        }

        .delete-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,0,0,0.8); color: white;
            border: none; border-radius: 50%; width: 25px; height: 25px;
            cursor: pointer; z-index: 10;
        }

        /* Aydınlık Mod */
        body.light-mode { background-color: #f0f2f5 !important; color: #1a1a1a !important; }
        body.light-mode .manga-card, 
        body.light-mode .container, 
        body.light-mode .chapter-item { 
            background: #ffffff !important; 
            color: #1a1a1a !important; 
            border-color: #ddd !important; 
        }
        body.light-mode nav { background: #fff; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <!-- SİTE LOGOSU -->
    <div class="site-logo">
        <a href="index.html">MIDNIGHT MANGA</a>
    </div>

    <nav>
        <span style="color: var(--primary); font-weight: bold; letter-spacing: 1px;">KARANLIĞIN SESİ</span>
    </nav>

    <div class="hero">
        <h1>Karanlık Dünyalara Açılan Kapı</h1>
        <p>En güncel manga ve webtoon çevirileri Midnight kalitesiyle.</p>
    </div>

    <div class="container">
        <div class="grid" id="mangaGrid"></div>
    </div>

    <!-- BUTONLAR -->
    <button id="adminToggle" onclick="openAdmin()"><i class="fas fa-cog"></i></button>
    <button onclick="topFunction()" id="backToTop" title="Başa Dön">↑</button>
    <button onclick="toggleMode()" id="modeToggle">🌓 Mod Değiştir</button>

    <div class="overlay" id="overlay" onclick="closeAdmin()"></div>
    <div id="adminPanel">
        <h3>Manga Ekle</h3>
        <input type="password" id="adminPass" class="admin-input" placeholder="Şifre (1234)">
        <input type="text" id="mName" class="admin-input" placeholder="Manga Adı">
        <input type="text" id="mImg" class="admin-input" placeholder="Kapak Resmi URL">
        <input type="text" id="mCap" class="admin-input" placeholder="Bölüm No (Örn: Bölüm 1)">
        <input type="text" id="mUrl" class="admin-input" placeholder="Drive/Mega Linki">
        <button class="btn-save" onclick="saveManga()">Kaydet</button>
    </div>

    <script>
        let mangas = JSON.parse(localStorage.getItem('mangas')) || [
            {
                name: "At the End of the Road",
                img: "at-the-end-of-the-road/b1/1%20(2).jpg",
                cap: "Bölümler",
                url: "chapters.html?name=At-The-End-Of-The-Road"
            }
        ];

        function renderMangas() {
            const grid = document.getElementById('mangaGrid');
            grid.innerHTML = '';
            mangas.forEach((m, index) => {
                grid.innerHTML += `
                    <div class="manga-card" onclick="window.location.href='${m.url}'">
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteManga(${index})">×</button>
                        <img src="${m.img}" class="manga-img" alt="${m.name}">
                        <div class="manga-content">
                            <div class="manga-title">${m.name}</div>
                            <div class="chapter-btn">${m.cap}</div>
                        </div>
                    </div>
                `;
            });
        }

        function openAdmin() {
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function saveManga() {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "1234") { alert("Şifre Yanlış!"); return; }
            
            const name = document.getElementById('mName').value;
            const img = document.getElementById('mImg').value;
            const cap = document.getElementById('mCap').value;
            const url = document.getElementById('mUrl').value;

            if(name && cap && url) {
                mangas.unshift({ name, img: img || 'https://via.placeholder.com/200x280', cap, url });
                localStorage.setItem('mangas', JSON.stringify(mangas));
                renderMangas();
                closeAdmin();
            } else {
                alert("Lütfen tüm alanları doldurun!");
            }
        }

        function deleteManga(index) {
            if(confirm("Silmek istediğine emin misin?")) {
                mangas.splice(index, 1);
                localStorage.setItem('mangas', JSON.stringify(mangas));
                renderMangas();
            }
        }

        // --- DİĞER FONKSİYONLAR ---
        let mybutton = document.getElementById("backToTop");
        window.onscroll = function() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        };

        function topFunction() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleMode() {
            document.body.classList.toggle("light-mode");
        }

        renderMangas();
    </script>
</body>
</html>
