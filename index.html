<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight-Manga</title>
    <style>
        :root { --main-color: #9d4edd; --bg-color: #0a0a0c; --card-bg: #161b22; }
        body { background-color: var(--bg-color); color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 2px solid var(--main-color); }
        header h1 { margin: 0; color: var(--main-color); text-transform: uppercase; }
        .manga-container { display: flex; justify-content: center; padding: 40px; }
        .manga-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; width: 250px; border: 1px solid #30363d; text-align: center; }
        .manga-card img { width: 100%; height: 350px; object-fit: cover; }
        .manga-info { padding: 15px; }
        .manga-info a { color: white; text-decoration: none; font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 10px; }
        .manga-info p { margin: 0; color: var(--main-color); }
    </style>
</head>
<body>

    <header>
        <h1>MIDNIGHT-MANGA</h1>
    </header>

    <div class="manga-container">
        <div class="manga-card">
            <img src="at-the-end-of-the-road/b1/1%20(2).jpg" onerror="this.src='at-the-end-of-the-road/b1/1.jpg'" alt="Manga Kapağı">
            <div class="manga-info">
                <a href="chapters.html?name=At-The-End-Of-The-Road">At the End of the Road</a>
                <p>Bölümler</p>
            </div>
        </div>
    </div>

</body>
</html>
