<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight-Manga | Karanlığın Sesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #9d4edd; /* Gece moru vurgu rengi */
            --bg: #0a0a0c;
            --card: #161b22;
            --text: #e6edf3;
            --accent: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(10, 10, 12, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .nav-links a {
            color: var(--accent);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--primary); }

        /* --- HERO SECTION --- */
        .hero {
            padding: 4rem 5%;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, var(--bg));
        }

        /* --- MANGA GRID --- */
        .container { padding: 2rem 5%; max-width: 1300px; margin: 0 auto; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .manga-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            transition: 0.3s;
            position: relative;
        }

        .manga-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .manga-img { width: 100%; height: 280px; object-fit: cover; }

        .manga-content { padding: 15px; }

        .manga-title { font-weight: bold; margin-bottom: 10px; font-size: 1rem; }

        .chapter-btn {
            background: #21262d;
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }

        .chapter-btn:hover { background: var(--primary); color: white; }

        /* --- ADMIN PANEL (MODU AYARLA) --- */
        #adminToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        #adminPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid var(--primary);
            z-index: 1001;
            width: 90%;
            max-width: 400px;
        }

        .admin-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: none; /* Sadece admin modunda görünür */
        }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">MIDNIGHT-MANGA</a>
    <div class="nav-links">
        <a href="#">Seriler</a>
        <a href="#">Yeni Bölümler</a>
        <a href="#"><i class="fab fa-discord"></i></a>
    </div>
</nav>

<div class="hero">
    <h1>Karanlık Dünyalara Açılan Kapı</h1>
    <p style="color: var(--accent)">En güncel manga ve webtoon çevirileri Midnight kalitesiyle.</p>
</div>

<div class="container">
    <div class="grid" id="mangaGrid">
        <!-- Mangalar Buraya Gelecek -->
    </div>
</div>

<!-- Admin Modu Butonu -->
<button id="adminToggle" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

<!-- Admin Panel -->
<div class="overlay" id="overlay" onclick="closeAdmin()"></div>
<div id="adminPanel">
    <h3>Yönetici Paneli</h3>
    <input type="password" id="adminPass" class="admin-input" placeholder="Şifre (1234)">
    <hr style="border-color: #30363d;">
    <input type="text" id="mName" class="admin-input" placeholder="Manga Adı">
    <input type="text" id="mImg" class="admin-input" placeholder="Resim URL">
    <input type="text" id="mCap" class="admin-input" placeholder="Son Bölüm (Örn: Bölüm 50)">
    <button class="btn-save" onclick="saveManga()">Listeye Ekle / Güncelle</button>
</div>

<script>
    let mangas = JSON.parse(localStorage.getItem('mangas')) || [
        { name: "The Beginning After The End", img: "https://via.placeholder.com/200x280/161b22/9d4edd?text=TBATE", cap: "Bölüm 175" },
        { name: "Solo Leveling", img: "https://via.placeholder.com/200x280/161b22/9d4edd?text=Solo+Leveling", cap: "Final" }
    ];

    let isAdmin = false;

    function renderMangas() {
        const grid = document.getElementById('mangaGrid');
        grid.innerHTML = '';
        mangas.forEach((m, index) => {
            grid.innerHTML += `
                <div class="manga-card">
                    <button class="delete-btn" onclick="deleteManga(${index})" style="display: ${isAdmin ? 'block' : 'none'}">×</button>
                    <img src="${m.img}" class="manga-img" alt="${m.name}">
                    <div class="manga-content">
                        <div class="manga-title">${m.name}</div>
                        <a href="#" class="chapter-btn">${m.cap}</a>
                    </div>
                </div>
            `;
        });
    }

    function openAdmin() {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeAdmin() {
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function saveManga() {
        const pass = document.getElementById('adminPass').value;
        if(pass !== "1234") { alert("Şifre Yanlış!"); return; }
        
        isAdmin = true; // Şifre doğruysa silme butonlarını açar
        const name = document.getElementById('mName').value;
        const img = document.getElementById('mImg').value;
        const cap = document.getElementById('mCap').value;

        if(name && cap) {
            mangas.unshift({ name, img: img || 'https://via.placeholder.com/200x280', cap });
            localStorage.setItem('mangas', JSON.stringify(mangas));
            renderMangas();
            alert("Başarıyla eklendi!");
            closeAdmin();
        }
    }

    function deleteManga(index) {
        if(confirm("Bu seriyi silmek istediğine emin misin?")) {
            mangas.splice(index, 1);
            localStorage.setItem('mangas', JSON.stringify(mangas));
            renderMangas();
        }
    }

    // İlk açılışta yükle
    renderMangas();
</script>

</body>
</html>
