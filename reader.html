<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; }
        img { width: 100%; max-width: 800px; display: block; border-bottom: 2px solid #111; }
        .nav { padding: 20px; width: 100%; display: flex; justify-content: center; background: #0a0a0c; position: sticky; top: 0; z-index: 100; }
        .btn { background: #9d4edd; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-family: sans-serif; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="chapters.html" class="btn">← Bölümlere Dön</a>
    </div>

    <div id="imageContainer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f'); 
        const count = parseInt(params.get('n'));

        if (folder && count) {
            const container = document.getElementById('imageContainer');
            const folderNum = folder.split('b').pop(); // b1 -> 1, b2 -> 2

            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                
                // 1. DENE: Senin b2 klasöründeki gibi "2 (1).jpg", "2 (2).jpg" formatı
                let primarySrc = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}%20(${i}).jpg`;
                
                // 2. DENE: Eğer tek başına olan "2.jpg" gibi bir dosya varsa (genelde ilk sayfa)
                if (i === 1) {
                    primarySrc = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}.jpg`;
                }

                img.src = primarySrc;

                // HATA YÖNETİMİ: Eğer yukarıdaki isimler tutmazsa diğer tüm ihtimalleri dene
                img.onerror = function() {
                    const tries = [
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/1%20(${i}).jpg`, // b1 tarzı
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${i}.jpg`,      // Düz 1.jpg tarzı
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/1%20(${i+1}).jpg` // Kaymış parantez
                    ];

                    let currentTry = parseInt(this.getAttribute('data-try') || 0);
                    if (currentTry < tries.length) {
                        this.setAttribute('data-try', currentTry + 1);
                        this.src = tries[currentTry];
                    } else {
                        this.style.display = 'none'; // Hiçbiri olmazsa gizle
                    }
                };

                container.appendChild(img);
            }
        }
    </script>
</body>
</html>
