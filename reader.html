<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        
        /* Resimlerin ortalanması */
        #imageContainer { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%; 
        }

        img { width: 100%; max-width: 800px; display: block; border-bottom: 2px solid #111; transition: 0.3s; }
        
        /* Üst Menü Çubuğu */
        .nav-top { 
            padding: 15px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #0a0a0c; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            gap: 15px; 
            border-bottom: 1px solid #9d4edd;
        }

        .nav-bottom { padding: 40px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        .btn { background: #9d4edd; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .btn:hover { background: #7b2cbf; transform: scale(1.05); }
        .btn-home { background: #333; }

        /* Boyut Seçim Kutusu */
        #sizeAdjust { background: #333; color: white; border: 1px solid #9d4edd; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* BAŞA DÖN BUTONU STİLİ (BURASI ÖNEMLİ) */
        #backToTop { 
            display: none; 
            position: fixed; 
            bottom: 30px; 
            right: 30px; 
            z-index: 999; 
            border: none; 
            background-color: #9d4edd; 
            color: white; 
            cursor: pointer; 
            padding: 15px 20px; 
            border-radius: 50%; 
            font-size: 20px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); 
            transition: 0.3s; 
        }
        #backToTop:hover { background-color: #7b2cbf; transform: translateY(-5px); }
    </style>
</head>
<body>

    <!-- Üst Navigasyon -->
    <div class="nav-top">
        <select id="sizeAdjust" onchange="adjustSize(this.value)">
            <option value="100%">Boyut: %100</option>
            <option value="80%">Boyut: %80</option>
            <option value="60%">Boyut: %60</option>
            <option value="40%">Boyut: %40</option>
        </select>
        <a href="chapters.html" class="btn btn-home">← Bölümler</a>
    </div>

    <!-- Manga Resimleri -->
    <div id="imageContainer"></div>

    <!-- Alt Navigasyon -->
    <div class="nav-bottom">
        <a href="index.html" class="btn btn-home">Ana Sayfa</a>
        <a id="nextChapterBtn" href="#" class="btn">Sonraki Bölüm →</a>
    </div>

    <!-- İŞTE O EKSİK BUTON -->
    <button onclick="topFunction()" id="backToTop" title="En Üste Git">↑</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f'); 
        const count = parseInt(params.get('n'));

        if (folder && count) {
            renderImages(folder, count);
            checkAndSetupNextButton(folder);
        }

        function renderImages(folder, count) {
            const container = document.getElementById('imageContainer');
            const folderNum = folder.split('b').pop(); 

            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                let src1 = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}%20(${i}).jpg`;
                if (i === 1) src1 = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}.jpg`;

                img.src = src1;
                img.onerror = function() {
                    const altPaths = [
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/1%20(${i}).jpg`,
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${i}.jpg`
                    ];
                    let currentTry = parseInt(this.getAttribute('data-try') || 0);
                    if (currentTry < altPaths.length) {
                        this.setAttribute('data-try', currentTry + 1);
                        this.src = altPaths[currentTry];
                    } else { this.style.display = 'none'; }
                };
                container.appendChild(img);
            }
        }

        function checkAndSetupNextButton(currentFolder) {
            const nextBtn = document.getElementById('nextChapterBtn');
            const pathParts = currentFolder.split('/');
            const lastPart = pathParts.pop(); 
            const mangaPath = pathParts.join('/'); 
            
            const currentNum = parseInt(lastPart.replace('b', ''));
            const nextNum = currentNum + 1;
            const nextFolder = `${mangaPath}/b${nextNum}`;
            
            const testImg = new Image();
            testImg.src = `https://midnight-manga-tr.github.io/midnight-manga/${nextFolder}/${nextNum}.jpg`;

            testImg.onload = function() {
                nextBtn.href = `reader.html?f=${nextFolder}&n=50`;
            };

            testImg.onerror = function() {
                nextBtn.innerText = "Seri Bitti - Ana Sayfaya Dön";
                nextBtn.href = "index.html";
                nextBtn.style.background = "#333";
            };
        }

        // Boyut Ayarı Fonksiyonu
        function adjustSize(val) {
            const images = document.querySelectorAll('#imageContainer img');
            images.forEach(img => {
                img.style.width = val;
                img.style.maxWidth = val; 
            });
        }

        // BAŞA DÖNME FONKSİYONLARI
        let mybutton = document.getElementById("backToTop");

        // Sayfa 300px aşağı inince butonu göster
        window.onscroll = function() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        };

        // Tıklayınca pürüzsüzce yukarı çıkar
        function topFunction() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
