<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        
        #imageContainer { display: flex; flex-direction: column; align-items: center; width: 100%; }
        img { width: 100%; max-width: 800px; display: block; border-bottom: 2px solid #111; transition: 0.3s; }
        
        .nav-bar { 
            padding: 15px; 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #0a0a0c; 
            z-index: 100; 
            gap: 10px; 
            flex-wrap: wrap;
        }
        .nav-top { position: sticky; top: 0; border-bottom: 1px solid #9d4edd; }
        
        /* Bölüm bittiğinde ferahlık sağlayan boşluk alanı */
        .nav-bottom { 
            padding: 100px 40px 60px 40px; /* Üstten 100px boşluk bırakarak ferahlık sağladık */
            border-top: 1px solid #222; 
            margin-top: 50px;
        }
        
        .btn { background: #9d4edd; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #7b2cbf; transform: scale(1.05); }
        .btn-home { background: #333; }

        #sizeAdjust { background: #333; color: white; border: 1px solid #9d4edd; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #backToTop { 
            display: none; position: fixed; bottom: 30px; right: 30px; z-index: 999; 
            border: none; background-color: #9d4edd; color: white; cursor: pointer; 
            padding: 15px 20px; border-radius: 50%; font-size: 20px; 
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); transition: 0.3s; 
        }
    </style>
</head>
<body>

    <!-- ÜST NAVİGASYON -->
    <div class="nav-bar nav-top">
        <a id="prevBtnTop" href="#" class="btn btn-home">← Önceki</a>
        <select id="sizeAdjust" onchange="adjustSize(this.value)">
            <option value="100%">%100</option>
            <option value="80%">%80</option>
            <option value="60%">%60</option>
        </select>
        <!-- Kısayol: Sayfa sonuna kaydırır -->
        <button onclick="scrollToBottom()" class="btn btn-home">Bölüm Listesi ↓</button>
        <a id="nextBtnTop" href="#" class="btn">Sonraki →</a>
    </div>

    <!-- Manga Resimleri -->
    <div id="imageContainer"></div>

    <!-- ALT NAVİGASYON (ID eklendi: bölüm listesi buraya kayacak) -->
    <div id="bottomNav" class="nav-bar nav-bottom">
        <a id="prevBtnBottom" href="#" class="btn btn-home">← Önceki Bölüm</a>
        <!-- Bu buton serinin ana sayfasına döner -->
        <a href="chapters.html" class="btn btn-home">Seri Sayfasına Dön</a>
        <a id="nextBtnBottom" href="#" class="btn">Sonraki Bölüm →</a>
    </div>

    <button onclick="topFunction()" id="backToTop" title="En Üste Git">↑</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f'); 
        const count = parseInt(params.get('n'));

        if (folder && count) {
            renderImages(folder, count);
            setupNavigation(folder);
        }

        function renderImages(folder, count) {
            const container = document.getElementById('imageContainer');
            const folderNum = folder.split('b').pop(); 

            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                let src1 = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}%20(${i}).jpg`;
                if (i === 1) src1 = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${folderNum}.jpg`;

                img.src = src1;
                img.onerror = function() {
                    const altPaths = [
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/1%20(${i}).jpg`,
                        `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${i}.jpg`
                    ];
                    let currentTry = parseInt(this.getAttribute('data-try') || 0);
                    if (currentTry < altPaths.length) {
                        this.setAttribute('data-try', currentTry + 1);
                        this.src = altPaths[currentTry];
                    } else { this.style.display = 'none'; }
                };
                container.appendChild(img);
            }
        }

        function setupNavigation(currentFolder) {
            const nextBtns = [document.getElementById('nextBtnTop'), document.getElementById('nextBtnBottom')];
            const prevBtns = [document.getElementById('prevBtnTop'), document.getElementById('prevBtnBottom')];
            
            const pathParts = currentFolder.split('/');
            const lastPart = pathParts.pop(); 
            const mangaPath = pathParts.join('/'); 
            
            const currentNum = parseInt(lastPart.replace('b', ''));
            
            if (currentNum > 1) {
                const prevUrl = `reader.html?f=${mangaPath}/b${currentNum - 1}&n=50`;
                prevBtns.forEach(b => b.href = prevUrl);
            } else {
                prevBtns.forEach(b => b.style.display = 'none');
            }

            const nextNum = currentNum + 1;
            const nextFolder = `${mangaPath}/b${nextNum}`;
            const testImg = new Image();
            testImg.src = `https://midnight-manga-tr.github.io/midnight-manga/${nextFolder}/${nextNum}.jpg`;

            testImg.onload = function() {
                const nextUrl = `reader.html?f=${nextFolder}&n=50`;
                nextBtns.forEach(b => b.href = nextUrl);
            };

            testImg.onerror = function() {
                nextBtns.forEach(b => {
                    b.innerText = "Bölüm Bitti - Seriye Dön";
                    b.href = "chapters.html"; 
                    b.style.background = "#333";
                });
            };
        }

        // Bölüm listesine pürüzsüz kaydırma fonksiyonu
        function scrollToBottom() {
            document.getElementById('bottomNav').scrollIntoView({ behavior: 'smooth' });
        }

        function adjustSize(val) {
            const images = document.querySelectorAll('#imageContainer img');
            images.forEach(img => {
                img.style.width = val;
                img.style.maxWidth = val; 
            });
        }

        let mybutton = document.getElementById("backToTop");
        window.onscroll = function() {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        };

        function topFunction() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
