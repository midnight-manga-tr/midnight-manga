<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #0a0a0c; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .reader-container { max-width: 800px; width: 100%; display: flex; flex-direction: column; }
        .reader-container img { width: 100%; height: auto; display: block; margin: 0; padding: 0; min-height: 100px; }
        .nav-bar { background: #161b22; width: 100%; padding: 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #9d4edd; }
        .btn { background: #9d4edd; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="nav-bar">
        <a href="index.html" class="btn">← Ana Sayfa</a>
        <span id="mangaTitle">Yükleniyor...</span>
        <div style="width: 80px;"></div>
    </div>
    <div class="reader-container" id="pageContainer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f');
        const total = parseInt(params.get('n'));

        document.getElementById('mangaTitle').innerText = folder.replace(/-/g, ' ').toUpperCase();
        const container = document.getElementById('pageContainer');

        for (let i = 1; i <= total; i++) {
            const img = document.createElement('img');
            
            // Senin dosyaların hem '1' hem '001' formatında olabilir ve uzantısı yok.
            // Bu kod önce uzantısız '001'i deneyecek.
            let fileName = i.toString().padStart(3, '0'); 
            img.src = `${folder}/${fileName}`; 

            // Eğer 001 çalışmazsa düz '1' olarak deneyecek
            img.onerror = function() {
                if (!this.src.includes('retry')) {
                    this.src = `${folder}/${i}?retry=true`;
                }
            };

            img.loading = "lazy";
            container.appendChild(img);
        }
    </script>
</body>
</html>
