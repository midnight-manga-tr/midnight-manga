<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #0a0a0c; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .reader-container { max-width: 800px; width: 100%; }
        .reader-container img { width: 100%; display: block; }
        .nav-bar { background: #161b22; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; border-bottom: 1px solid #9d4edd; }
        .btn { color: #9d4edd; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-bar"><a href="index.html" class="btn">← ANA SAYFA</a></div>
    <div class="reader-container" id="pageContainer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f');
        const total = parseInt(params.get('n'));
        const container = document.getElementById('pageContainer');

        for (let i = 2; i <= total + 1; i++) {
            const img = document.createElement('img');
            // Senin dosyaların "1 (2).jpg" şeklinde gittiği için ismi böyle ayarladık
            // URL içindeki boşlukları %20 olarak kodlamamız gerekir
            img.src = `${folder}/1%20(${i}).jpg`; 
            img.loading = "lazy";
            container.appendChild(img);
        }
    </script>
</body>
</html>
