<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Reader</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; }
        img { width: 100%; max-width: 800px; display: block; }
        .nav { padding: 20px; }
        .btn { background: #9d4edd; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="chapters.html" class="btn">Bölümlere Dön</a>
    </div>

    <div id="imageContainer"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const folder = params.get('f'); // Örn: at-the-end-of-the-road/b1
        const count = parseInt(params.get('n'));

        if (folder && count) {
            loadImages(folder, count);
        }

        function loadImages(folder, count) {
            const container = document.getElementById('imageContainer');
            
            // Klasör yolunun son parçasını al (b1, b2 vb.) ve içindeki rakamı bul
            const pathParts = folder.split('/');
            const lastFolder = pathParts[pathParts.length - 1]; 
            const folderNum = lastFolder.replace('b', ''); // 'b1' -> '1', 'b2' -> '2'

            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                
                // Senin yükleme tarzına göre 2 farklı ihtimali de deniyoruz:
                // 1. İhtimal: 1 (2).jpg veya 2 (1).jpg formatı
                // 2. İhtimal: Direkt 1.jpg, 2.jpg formatı
                
                let fileName = "";
                if (i === 1) {
                    fileName = `${folderNum}.jpg`; // Örn: 1.jpg veya 2.jpg
                } else {
                    fileName = `${folderNum}%20(${i}).jpg`; // Örn: 1 (2).jpg veya 2 (2).jpg
                }

                img.src = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${fileName}`;

                // Eğer yukarıdaki isimle bulamazsa, düz rakam denesin (i.jpg)
                img.onerror = function() {
                    if (!this.getAttribute('data-tried-second')) {
                        this.setAttribute('data-tried-second', 'true');
                        this.src = `https://midnight-manga-tr.github.io/midnight-manga/${folder}/${i}.jpg`;
                    } else {
                        this.style.display = 'none'; // Hiçbirini bulamazsa gizle
                    }
                };

                container.appendChild(img);
            }
        }
    </script>
</body>
</html>
